<!DOCTYPE html>
<html>
<head>
  <title>Germinare</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

  <!-- Estilo bonito -->
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4CAF50, #2E7D32);
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: rgba(0,0,0,0.2);
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    .box {
      background: white;
      color: black;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #388E3C;
    }

    input {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #chat {
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<header>🌱 Germinare</header>

<div style="text-align:center; margin-top:10px;">
  <button onclick="login()">Login com Google</button>
</div>

<div class="container">

  <div class="box">
    <h3>💬 Chat</h3>
    <input id="msg" placeholder="Digite...">
    <button onclick="send()">Enviar</button>
    <div id="chat"></div>
  </div>

  <div class="box">
    <h3>👥 Amigos</h3>
    <input id="friend" placeholder="Nome">
    <button onclick="addFriend()">Adicionar</button>
    <div id="requests"></div>
  </div>

  <div class="box">
    <h3>💰 Moedas: <span id="coins">0</span></h3>
  </div>

  <div class="box">
    <h3>🛒 Loja</h3>
    <button onclick="buy(50)">Óculos - 50</button>
    <button onclick="buy(100)">Roupa - 100</button>
  </div>

  <div class="box">
    <h3>🏆 Ranking</h3>
    <div id="ranking"></div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDotLhxhk3pz9o-Ux6RTmUnjqVYHLz0arc",
  authDomain: "germinaapp-d9eb4.firebaseapp.com",
  projectId: "germinaapp-d9eb4"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user = null;

// LOGIN
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(res => {
    user = res.user;

    db.collection("users").doc(user.uid).set({
      name: user.displayName,
      coins: 0
    }, { merge: true });

    alert("Logado como " + user.displayName);
  }).catch(e => alert("Erro login"));
}

// CHAT
function send() {
  if (!user) return alert("Faça login primeiro!");

  const msg = document.getElementById("msg").value;

  db.collection("messages").add({
    user: user.displayName,
    text: msg
  });

  db.collection("users").doc(user.uid).update({
    coins: firebase.firestore.FieldValue.increment(2)
  });
}

// ATUALIZA CHAT
db.collection("messages").onSnapshot(snap => {
  let html = "";
  snap.forEach(doc => {
    const m = doc.data();
    html += `<p><b>${m.user}:</b> ${m.text}</p>`;
  });
  document.getElementById("chat").innerHTML = html;
});

// AMIGOS
function addFriend() {
  if (!user) return alert("Faça login!");

  const name = document.getElementById("friend").value;

  db.collection("requests").add({
    from: user.displayName,
    to: name
  });
}

// REQUESTS
db.collection("requests").onSnapshot(snap => {
  let html = "";
  snap.forEach(doc => {
    const r = doc.data();
    if (user && r.to === user.displayName) {
      html += `<p>${r.from} <button onclick="accept('${doc.id}')">Aceitar</button></p>`;
    }
  });
  document.getElementById("requests").innerHTML = html;
});

// ACEITAR
function accept(id) {
  db.collection("users").doc(user.uid).update({
    coins: firebase.firestore.FieldValue.increment(20)
  });

  db.collection("requests").doc(id).delete();
}

// MOEDAS
setInterval(() => {
  if (!user) return;

  db.collection("users").doc(user.uid).get().then(doc => {
    if (doc.exists) {
      document.getElementById("coins").innerText = doc.data().coins;
    }
  });
}, 2000);

// LOJA
function buy(price) {
  if (!user) return;

  db.collection("users").doc(user.uid).update({
    coins: firebase.firestore.FieldValue.increment(-price)
  });
}

// RANKING
db.collection("users").orderBy("coins","desc").onSnapshot(snap => {
  let html = "";
  let i = 1;
  snap.forEach(doc => {
    const u = doc.data();
    html += `<p>#${i++} ${u.name} - ${u.coins}</p>`;
  });
  document.getElementById("ranking").innerHTML = html;
});
</script>

</body>
</html>
